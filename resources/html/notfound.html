<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>404 - Not Found</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            padding: 50px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 10px 50px rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            max-width: 500px;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            color: #ef4444;
            letter-spacing: 2px;
        }

        h2 {
            margin-top: 10px;
            font-size: 1.5rem;
            color: #f8fafc;
        }

        p {
            margin-top: 10px;
            opacity: 0.8;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 16px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s;
        }

        a:hover {
            background: #2563eb;
            transform: scale(1.05);
        }

        .countdown {
            margin-top: 15px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .glitch {
            animation: flicker 1.5s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 1; transform: translateX(0); }
            50% { opacity: 0.85; transform: translateX(1px); }
            100% { opacity: 1; transform: translateX(-1px); }
        }
    </style>
</head>

<body>
<div class="container">
    <h1 class="glitch">404</h1>
    <h2>Page Not Found</h2>
    <p>The resource you are looking for does not exist or has been moved.</p>

    <a href="/">Go back home</a>

    <div class="countdown" id="countdown"></div>

    <p style="margin-top: 25px; font-size: 0.8rem; opacity: 0.5;">
        Tip: check the URL or go back to the main server page.
    </p>

    <p style="margin-top: 15px;">
        Project repo:
        :contentReference[oaicite:0]{index=0}
    </p>
</div>

<script>
    let seconds = 15;
    const el = document.getElementById("countdown");

    const interval = setInterval(() => {
        el.innerText = "Redirecting to home in " + seconds + "s...";
        seconds--;

        if (seconds < 0) {
            clearInterval(interval);
            window.location.href = "/";
        }
    }, 1000);
</script>
</body>
</html>
